name: Build and Release Rust Application

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '模拟的版本号（用于测试）'
        required: false
        default: 'v1.0.0-test'

permissions:
  contents: write

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            base_name: ferry-windows-x86_64.exe
          
          - os: macos-15-intel
            target: x86_64-apple-darwin
            base_name: ferry-macos-x86_64
          
          - os: macos-15
            target: aarch64-apple-darwin
            base_name: ferry-macos-aarch64
          
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            base_name: ferry-linux-x86_64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}
        
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.target }}-
          
    - name: Setup musl (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        rustup target add x86_64-unknown-linux-musl
        sudo apt-get update
        sudo apt-get install -y musl-tools musl-dev
      
    - name: Build release binary
      shell: bash
      run: |
        echo "Building version: ${{ github.ref_name }}"
        echo "Target: ${{ matrix.target }}"

        VERSION="${{ github.ref_name }}"
        ARTIFACT_NAME="${{ matrix.base_name }}-${VERSION}"

        # 构建
        cargo build --release --target ${{ matrix.target }}

        # 查找并复制二进制文件
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          # Windows: 查找 .exe 文件
          for file in target/${{ matrix.target }}/release/*.exe; do
            if [ -f "$file" ]; then
              cp "$file" "$ARTIFACT_NAME"
              echo "Copied: $file to $ARTIFACT_NAME"
              break
            fi
          done
        else
          # Unix: 查找可执行文件
          for file in target/${{ matrix.target }}/release/*; do
            if [ -f "$file" ] && [ -x "$file" ]; then
              cp "$file" "$ARTIFACT_NAME"
              echo "Copied: $file to $ARTIFACT_NAME"
              break
            fi
          done
        fi

        # 验证文件存在
        if [ -f "$ARTIFACT_NAME" ]; then
          echo "Build successful: $ARTIFACT_NAME"
          ls -la "$ARTIFACT_NAME"
        else
          echo "Error: Binary not found!"
          ls -la "target/${{ matrix.target }}/release/"
          exit 1
        fi
        
    - name: Optimize binary size
      shell: bash
      run: |
        VERSION="${{ github.ref_name }}"
        ARTIFACT_NAME="${{ matrix.base_name }}-${VERSION}"
        if command -v strip >/dev/null 2>&1 && [ -f "$ARTIFACT_NAME" ]; then
          echo "Stripping binary..."
          strip "$ARTIFACT_NAME" || echo "Strip failed, continuing..."
        else
          echo "Strip not available or binary not found, skipping..."
        fi
        
    - name: Set executable permissions
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        VERSION="${{ github.ref_name }}"
        ARTIFACT_NAME="${{ matrix.base_name }}-${VERSION}"
        chmod +x "$ARTIFACT_NAME"
        echo "Set executable permissions for $ARTIFACT_NAME"
      
    - name: Calculate SHA256 checksum
      shell: bash
      run: |
        VERSION="${{ github.ref_name }}"
        ARTIFACT_NAME="${{ matrix.base_name }}-${VERSION}"
        if [ -f "$ARTIFACT_NAME" ]; then
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARTIFACT_NAME" > "$ARTIFACT_NAME.sha256"
          elif command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$ARTIFACT_NAME" > "$ARTIFACT_NAME.sha256"
          else
            echo "SHA256 calculation not available"
          fi
        fi
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.base_name }}-${{ github.ref_name }}
        path: |
          ${{ matrix.base_name }}-${{ github.ref_name }}
          ${{ matrix.base_name }}-${{ github.ref_name }}.sha256
        retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Prepare release assets
      shell: bash
      run: |
        VERSION="${{ github.ref_name }}"
        cat > release_notes.md << EOF
        # Release $VERSION

        **Build Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")

        ## Downloads

        - **Windows x86_64:** [ferry-windows-x86_64.exe-$VERSION](ferry-windows-x86_64.exe-$VERSION)
        - **macOS Intel:** [ferry-macos-x86_64-$VERSION](ferry-macos-x86_64-$VERSION)
        - **macOS Apple Silicon:** [ferry-macos-aarch64-$VERSION](ferry-macos-aarch64-$VERSION)
        - **Linux x86_64:** [ferry-linux-x86_64-$VERSION](ferry-linux-x86_64-$VERSION)

        ## SHA256 Checksums
        ```
        $(cat ferry-*.sha256 2>/dev/null || echo "No checksums found")
        ```
        EOF

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body_path: release_notes.md
        draft: false
        prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        files: |
          **/ferry-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
